<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Per Francesca</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #fff0f3; /* Rosa chiarissimo */
            overflow: hidden; /* Impedisce la comparsa delle barre di scorrimento quando il tasto scappa */
        }

        h1 {
            color: #ff4d6d;
            font-size: 2.5rem;
            text-align: center;
            padding: 0 20px;
        }

        p {
            color: #880d1e;
            font-size: 1.2rem;
            margin-top: -10px;
            font-weight: bold;
        }

        .container {
            text-align: center;
        }

        .buttons {
            margin-top: 50px;
            display: flex;
            justify-content: center;
            gap: 30px;
        }

        button {
            padding: 15px 35px;
            font-size: 1.3rem;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        /* Il tasto SI scappa */
        #btnSi {
            background-color: #ff4d6d;
            color: white;
            position: relative; /* Necessario per il movimento */
            z-index: 999;
        }

        /* Il tasto NO rimane fermo */
        #btnNo {
            background-color: #adb5bd;
            color: white;
        }

        #btnNo:hover {
            background-color: #6c757d;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Francesca! <br> Vuoi fidanzarti con me?</h1>
        <p>By Marco</p>

        <div class="buttons">
            <button id="btnSi" onmouseover="scappaSi()" onclick="vittoria()">Sì</button>
            <button id="btnNo" onclick="messaggioNo()">No</button>
        </div>
    </div>

    <script>
        function scappaSi() {
            const btnSi = document.getElementById('btnSi');
            
            // Calcola coordinate casuali basate sulla grandezza della finestra
            // Sottraiamo 100 per evitare che il tasto finisca fuori dal bordo destro o inferiore
            const x = Math.random() * (window.innerWidth - 150);
            const y = Math.random() * (window.innerHeight - 100);
            
            // Sposta il tasto in una posizione assoluta casuale
            btnSi.style.position = 'fixed';
            btnSi.style.left = x + 'px';
            btnSi.style.top = y + 'px';
        }

        function vittoria() {
            // Questo apparirà se lei è abbastanza veloce da prenderlo!
            alert("Incredibile, mi hai preso! ❤️ Allora è un SÌ ufficiale!");
        }

        function messaggioNo() {
            alert("Ehi! Il tasto 'No' non dovrebbe essere quello interessante qui! 😜");
        }
    </script>

</body>
</html>
